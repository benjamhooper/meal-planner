name: Deploy Web

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/meal-planner-web

jobs:
  build-and-deploy:
    name: Build, push, and deploy web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io
      id-token: write   # needed for OIDC login to Azure

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          # API_INTERNAL_URL: where the Next.js server proxies /api/* requests.
          # In Container Apps, apps in the same environment are reachable by app name.
          build-args: |
            API_INTERNAL_URL=http://mealplanner-api
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_WEB_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}:${{ github.sha }}
