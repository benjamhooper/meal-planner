name: Deploy API to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"

env:
  DOTNET_VERSION: "9.0.x"
  API_PROJECT: api/MealPlanner.Api/MealPlanner.Api.csproj

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.API_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.API_PROJECT }} --no-restore --configuration Release

      - name: Test
        run: dotnet test ${{ env.API_PROJECT }} --no-build --configuration Release --verbosity minimal
        continue-on-error: true

      - name: Publish
        run: dotnet publish ${{ env.API_PROJECT }} --no-build --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish
