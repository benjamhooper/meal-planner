services:
  # ── SQL Server ────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mealplanner-sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"   # Expose SQL Server on the local network
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_PID: Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── .NET 10 API ───────────────────────────────────────────────────────────
  # Internal-only — traffic reaches it via Next.js server-side rewrites.
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mealplanner-api
    restart: unless-stopped
    ports:
      - "8080:8080"   # .NET API — accessible on the local network
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=mealplanner;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True
      - Jwt__Secret=${JWT_SECRET}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - GitHub__ClientId=${GH_CLIENT_ID}
      - GitHub__ClientSecret=${GH_CLIENT_SECRET}
      - FrontendUrl=http://${DOMAIN}
      - AllowedOrigins__0=http://${DOMAIN}
      - AllowedOrigins__1=http://${LAN_IP}:3000
      - AllowedOrigins__2=http://localhost:3000

  # ── Next.js frontend ──────────────────────────────────────────────────────
  # tailscale Funnel points here. /api/* requests are rewritten server-side
  # to the api container — the browser never talks to the api directly.
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: mealplanner-web
    restart: unless-stopped
    ports:
      - "3000:3000"   # Next.js — accessible on the local network
    depends_on:
      - api

volumes:
  sqlserver_data:
